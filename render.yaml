services:
  - type: web
    name: aiquizplatform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: 10000
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: aiquizplatform-db
          property: connectionString
      - key: Groq__ApiKey
        sync: false
      - key: Email__Host
        value: smtp.gmail.com
      - key: Email__Port
        value: 587
      - key: Email__Username
        sync: false
      - key: Email__Password
        sync: false
      - key: Email__SenderName
        value: QuizAI
      - key: Email__SenderEmail
        sync: false

databases:
  - name: aiquizplatform-db
    plan: free
    databaseName: aiquizdb
    user: aiquizplatform
